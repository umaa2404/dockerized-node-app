name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-test-push:

    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4


    # 2. Setup Node
    - name: Install dependencies
      run: |
        cd app
        npm install


    # 3. Run tests
    - name: Run tests
      run: |
        cd app
        npm test || true


    # 4. Login Docker Hub
    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    # 5. Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t umamani24/dockerized-node-app .


    # 6. Push Docker Image
    - name: Push Docker Image
      run: |
        docker push umamani24/dockerized-node-app